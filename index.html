<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vacaciones · Equipo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #F5EDD6;
    --cream: #FAF6EE;
    --terracotta: #C8603A;
    --terracotta-light: #E8876A;
    --sage: #6B8F71;
    --sage-light: #A8C4AA;
    --navy: #1C2B3A;
    --navy-light: #2E4057;
    --gold: #D4A847;
    --text: #2A2015;
    --muted: #8A7560;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* BG texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(200,96,58,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(107,143,113,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 1;
    background: var(--navy);
    padding: 0;
    overflow: hidden;
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 36px 40px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 46px);
    font-weight: 900;
    color: var(--sand);
    line-height: 1.1;
    letter-spacing: -0.5px;
  }

  .header-left h1 span {
    color: var(--terracotta-light);
  }

  .header-left p {
    margin-top: 8px;
    color: rgba(245,237,214,0.55);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .header-deco {
    font-size: 64px;
    opacity: 0.15;
    line-height: 1;
    user-select: none;
  }

  /* ── YEAR NAV ── */
  .year-nav {
    position: relative;
    z-index: 1;
    background: var(--navy-light);
    padding: 12px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .year-nav button {
    background: none;
    border: none;
    color: var(--sand);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
    transition: background 0.2s;
  }
  .year-nav button:hover { background: rgba(255,255,255,0.1); }

  .year-nav .year-label {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--sand);
    font-weight: 700;
    min-width: 80px;
    text-align: center;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px 60px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 32px;
    align-items: start;
  }

  @media (max-width: 820px) {
    .main { grid-template-columns: 1fr; }
    .header-inner { padding: 24px 20px 20px; }
    .year-nav { padding: 12px 20px; }
  }

  /* ── CALENDAR GRID ── */
  .calendar-section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--navy);
    margin-bottom: 20px;
    font-weight: 700;
  }

  .months-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .month-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(28,43,58,0.07);
    border: 1px solid rgba(28,43,58,0.06);
    transition: box-shadow 0.2s;
  }
  .month-card:hover { box-shadow: 0 4px 20px rgba(28,43,58,0.12); }

  .month-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 12px;
    text-transform: capitalize;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .month-name::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--sand);
  }

  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 4px;
  }

  .day-header {
    text-align: center;
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.5px;
    padding: 3px 0;
    text-transform: uppercase;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .day-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 400;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    color: var(--text);
    user-select: none;
  }

  .day-cell.empty { cursor: default; }
  .day-cell.past { color: #ccc; cursor: default; }

  .day-cell:not(.empty):not(.past):hover {
    background: var(--sand);
    transform: scale(1.1);
  }

  .day-cell.today {
    font-weight: 700;
    color: var(--terracotta);
  }
  .day-cell.today::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--terracotta);
  }

  /* vacation colors per user */
  .day-cell.booked {
    border-radius: 6px;
    font-weight: 500;
  }

  .day-cell .dots {
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 2px;
  }

  .day-cell .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
  }

  /* ── SIDEBAR ── */
  .sidebar {}

  /* ── BOOKING FORM ── */
  .form-card {
    background: var(--navy);
    border-radius: 20px;
    padding: 28px;
    color: var(--sand);
    margin-bottom: 24px;
  }

  .form-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--sand);
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(245,237,214,0.6);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .form-group select,
  .form-group input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid rgba(245,237,214,0.15);
    background: rgba(255,255,255,0.06);
    color: var(--sand);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group select:focus,
  .form-group input:focus {
    border-color: var(--terracotta-light);
  }

  .form-group select option { background: var(--navy); }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn-save {
    width: 100%;
    padding: 12px;
    background: var(--terracotta);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }

  .btn-save:hover { background: var(--terracotta-light); }
  .btn-save:active { transform: scale(0.98); }

  /* ── TEAM LEGEND ── */
  .legend-card {
    background: white;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(28,43,58,0.07);
    border: 1px solid rgba(28,43,58,0.06);
    margin-bottom: 24px;
  }

  .legend-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 16px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .legend-item:hover { background: var(--cream); }

  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .legend-name {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }

  .legend-days {
    font-size: 12px;
    color: var(--muted);
    background: var(--cream);
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* ── UPCOMING ── */
  .upcoming-card {
    background: white;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(28,43,58,0.07);
    border: 1px solid rgba(28,43,58,0.06);
  }

  .upcoming-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 16px;
  }

  .upcoming-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--sand);
    align-items: flex-start;
  }
  .upcoming-item:last-child { border-bottom: none; }

  .upcoming-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .upcoming-info .name {
    font-size: 13px;
    font-weight: 500;
  }

  .upcoming-info .dates {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .upcoming-info .note {
    font-size: 11px;
    color: var(--sage);
    font-style: italic;
    margin-top: 2px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy);
    color: var(--sand);
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    z-index: 9999;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── DELETE BTN on day hover ── */
  .day-cell .del-btn {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(200,50,50,0.15);
    border-radius: 6px;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .day-tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--navy);
    color: var(--sand);
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 6px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
  }

  .day-cell:hover .day-tooltip { opacity: 1; }

  /* No upcoming */
  .no-upcoming {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 16px 0;
  }

  .conflict-badge {
    display: inline-block;
    background: var(--terracotta);
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <h1>Vacaciones <span>Equipo</span></h1>
      <p>Planifica y coordina los días de descanso del equipo</p>
    </div>
    <div class="header-deco">🌴</div>
  </div>
</header>

<div class="year-nav">
  <button id="prevYear">&#8592;</button>
  <span class="year-label" id="yearLabel">2025</span>
  <button id="nextYear">&#8594;</button>
</div>

<div class="main">
  <div class="calendar-section">
    <h2 id="calTitle">Calendario 2025</h2>
    <div class="months-grid" id="monthsGrid"></div>
  </div>

  <div class="sidebar">
    <!-- FORM -->
    <div class="form-card">
      <h3>✈️ Agregar vacaciones</h3>
      <div class="form-group">
        <label>Compañero</label>
        <select id="selUser"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Desde</label>
          <input type="date" id="dateFrom">
        </div>
        <div class="form-group">
          <label>Hasta</label>
          <input type="date" id="dateTo">
        </div>
      </div>
      <div class="form-group">
        <label>Nota (opcional)</label>
        <input type="text" id="note" placeholder="Ej: Playa, familia...">
      </div>
      <button class="btn-save" id="btnSave">Guardar 🌴</button>
    </div>

    <!-- LEGEND -->
    <div class="legend-card">
      <h3>🧑‍💼 Equipo</h3>
      <div id="legendList"></div>
    </div>

    <!-- UPCOMING -->
    <div class="upcoming-card">
      <h3>📅 Próximas vacaciones</h3>
      <div id="upcomingList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── CONFIG: Personas y colores ── */
const USERS = [
  { id: 'Gisela',    name: 'Gisela',    color: '#C8603A', bg: '#FDE8E0' },
  { id: 'Emma', name: 'Emma', color: '#6B8F71', bg: '#DCF0DF' },
  { id: 'Señor',  name: 'Señor',  color: '#4A7BB5', bg: '#D8E9F8' },
  { id: 'Chico de mi edad',  name: 'Chico de mi edad',  color: '#A0689A', bg: '#EFD9ED' },
];

const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                     'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAY_NAMES = ['Lu','Ma','Mi','Ju','Vi','Sá','Do'];

/* ── STATE ── */
let currentYear = new Date().getFullYear();
let vacations = {}; // { 'YYYY-MM-DD': [{userId, note}] }

const STORAGE_KEY = 'vacaciones_equipo_v1';

/* ── PERSIST (localStorage for GitHub Pages) ── */
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) vacations = JSON.parse(raw);
  } catch(e) { vacations = {}; }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(vacations));
  } catch(e) {}
}

/* ── HELPERS ── */
function pad(n) { return String(n).padStart(2,'0'); }
function dateKey(y,m,d) { return `${y}-${pad(m+1)}-${pad(d)}`; }
function parseKey(k) { const [y,m,d]=k.split('-'); return {y:+y,m:+m-1,d:+d}; }

function toastMsg(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2500);
}

function getUserById(id) { return USERS.find(u=>u.id===id); }

function countDaysForUser(userId) {
  let count = 0;
  for (const key in vacations) {
    if (vacations[key].some(e=>e.userId===userId)) count++;
  }
  return count;
}

function getDaysInRange(from, to) {
  const days = [];
  const cur = new Date(from);
  const end = new Date(to);
  while (cur <= end) {
    days.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate()+1);
  }
  return days;
}

/* ── RENDER CALENDAR ── */
function renderCalendar() {
  const grid = document.getElementById('monthsGrid');
  grid.innerHTML = '';
  document.getElementById('calTitle').textContent = `Calendario ${currentYear}`;
  document.getElementById('yearLabel').textContent = currentYear;

  const today = new Date();
  const todayKey = today.toISOString().slice(0,10);

  for (let m = 0; m < 12; m++) {
    const card = document.createElement('div');
    card.className = 'month-card';

    const firstDay = new Date(currentYear, m, 1);
    const daysInMonth = new Date(currentYear, m+1, 0).getDate();
    // Monday-first offset
    let startDow = firstDay.getDay(); // 0=Sun
    startDow = startDow === 0 ? 6 : startDow - 1;

    card.innerHTML = `<div class="month-name">${MONTH_NAMES[m]}</div>
      <div class="day-headers">${DAY_NAMES.map(d=>`<div class="day-header">${d}</div>`).join('')}</div>
      <div class="days-grid" id="days-${m}"></div>`;
    grid.appendChild(card);

    const dg = card.querySelector(`#days-${m}`);

    // Empty cells
    for (let i=0; i<startDow; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      dg.appendChild(empty);
    }

    for (let d=1; d<=daysInMonth; d++) {
      const key = dateKey(currentYear, m, d);
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      if (key === todayKey) cell.classList.add('today');

      const cellDate = new Date(currentYear, m, d);
      const isPast = cellDate < new Date(today.toDateString());
      if (isPast && key !== todayKey) cell.classList.add('past');

      // Bookings
      const entries = vacations[key] || [];

      // Day number
      const numSpan = document.createElement('span');
      numSpan.textContent = d;
      cell.appendChild(numSpan);

      // Dots
      if (entries.length > 0) {
        const dotsDiv = document.createElement('div');
        dotsDiv.className = 'dots';
        entries.forEach(e => {
          const u = getUserById(e.userId);
          if (!u) return;
          const dot = document.createElement('div');
          dot.className = 'dot';
          dot.style.background = u.color;
          dotsDiv.appendChild(dot);
        });
        cell.appendChild(dotsDiv);

        // Color background by first user
        const firstUser = getUserById(entries[0].userId);
        if (firstUser) {
          cell.style.background = firstUser.bg;
          cell.style.color = firstUser.color;
          cell.style.fontWeight = '600';
        }

        // Tooltip
        const tip = document.createElement('div');
        tip.className = 'day-tooltip';
        tip.textContent = entries.map(e=>{
          const u=getUserById(e.userId);
          return u ? (u.name + (e.note?` · ${e.note}`:'')) : '';
        }).join(' | ');
        cell.appendChild(tip);
      }

      // Click to remove (if has booking)
      if (!isPast || key === todayKey) {
        cell.addEventListener('click', () => {
          if (entries.length > 0) {
            // remove first user's entry on click
            showRemoveModal(key, entries);
          }
        });
      }

      dg.appendChild(cell);
    }
  }

  renderLegend();
  renderUpcoming();
}

/* ── REMOVE MODAL (simple) ── */
function showRemoveModal(key, entries) {
  if (entries.length === 0) return;
  const names = entries.map(e=>{
    const u=getUserById(e.userId);
    return u ? u.name : e.userId;
  }).join(', ');
  const {y,m,d}=parseKey(key);
  const label=`${d} ${MONTH_NAMES[m]} ${y}`;
  const confirm = window.confirm(`¿Eliminar vacaciones del ${label}?\n\nRegistrado: ${names}\n\nSe eliminará el primer registro.`);
  if (confirm) {
    const newEntries = [...entries];
    newEntries.shift();
    if (newEntries.length === 0) delete vacations[key];
    else vacations[key] = newEntries;
    saveData();
    renderCalendar();
    toastMsg('🗑️ Registro eliminado');
  }
}

/* ── LEGEND ── */
function renderLegend() {
  const list = document.getElementById('legendList');
  list.innerHTML = '';
  USERS.forEach(u => {
    const days = countDaysForUser(u.id);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="legend-dot" style="background:${u.color}"></div>
      <span class="legend-name">${u.name}</span>
      <span class="legend-days">${days} días</span>`;
    list.appendChild(item);
  });
}

/* ── UPCOMING ── */
function renderUpcoming() {
  const list = document.getElementById('upcomingList');
  list.innerHTML = '';
  const today = new Date();
  today.setHours(0,0,0,0);

  // Collect ranges
  const allEntries = [];
  for (const key in vacations) {
    const {y,m,d}=parseKey(key);
    const date = new Date(y,m,d);
    if (date >= today) {
      vacations[key].forEach(e => {
        allEntries.push({key, date, userId: e.userId, note: e.note});
      });
    }
  }

  allEntries.sort((a,b)=>a.date-b.date);

  // Group consecutive days per user
  const grouped = [];
  const usedKeys = {};

  allEntries.forEach(entry => {
    const k = entry.userId + '_' + entry.key;
    if (usedKeys[k]) return;

    // find range
    let end = new Date(entry.date);
    let cur = new Date(entry.date);
    cur.setDate(cur.getDate()+1);
    while (true) {
      const nextKey = cur.toISOString().slice(0,10);
      if (vacations[nextKey] && vacations[nextKey].some(e=>e.userId===entry.userId)) {
        end = new Date(cur);
        usedKeys[entry.userId+'_'+nextKey] = true;
        cur.setDate(cur.getDate()+1);
      } else break;
    }

    grouped.push({
      userId: entry.userId,
      start: entry.date,
      end,
      note: entry.note,
    });
    usedKeys[k] = true;
  });

  if (grouped.length === 0) {
    list.innerHTML = '<div class="no-upcoming">No hay vacaciones próximas 🏖️</div>';
    return;
  }

  grouped.slice(0,8).forEach(g => {
    const u = getUserById(g.userId);
    if (!u) return;
    const fmt = (d) => `${d.getDate()} ${MONTH_NAMES[d.getMonth()].slice(0,3)}`;
    const sameDay = g.start.toDateString()===g.end.toDateString();
    const datesStr = sameDay ? fmt(g.start) : `${fmt(g.start)} – ${fmt(g.end)}`;

    const item = document.createElement('div');
    item.className = 'upcoming-item';
    item.innerHTML = `
      <div class="upcoming-dot" style="background:${u.color}"></div>
      <div class="upcoming-info">
        <div class="name">${u.name}</div>
        <div class="dates">${datesStr}</div>
        ${g.note ? `<div class="note">${g.note}</div>` : ''}
      </div>`;
    list.appendChild(item);
  });
}

/* ── FORM ── */
function initForm() {
  const sel = document.getElementById('selUser');
  USERS.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.id;
    opt.textContent = u.name;
    sel.appendChild(opt);
  });

  // Default dates
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('dateFrom').value = today;
  document.getElementById('dateTo').value = today;

  document.getElementById('btnSave').addEventListener('click', () => {
    const userId = document.getElementById('selUser').value;
    const from = document.getElementById('dateFrom').value;
    const to = document.getElementById('dateTo').value;
    const note = document.getElementById('note').value.trim();

    if (!from || !to) { toastMsg('⚠️ Selecciona fechas'); return; }
    if (from > to) { toastMsg('⚠️ La fecha inicio debe ser antes del fin'); return; }

    const days = getDaysInRange(from, to);
    if (days.length > 60) { toastMsg('⚠️ Máximo 60 días por registro'); return; }

    let added = 0;
    days.forEach(key => {
      if (!vacations[key]) vacations[key] = [];
      // Avoid duplicate for same user
      if (!vacations[key].some(e=>e.userId===userId)) {
        vacations[key].push({ userId, note });
        added++;
      }
    });

    saveData();
    renderCalendar();
    document.getElementById('note').value = '';

    const u = getUserById(userId);
    toastMsg(`✅ ${u.name}: ${added} día${added!==1?'s':''} guardado${added!==1?'s':''}`);
  });
}

/* ── YEAR NAV ── */
document.getElementById('prevYear').addEventListener('click', () => {
  currentYear--;
  renderCalendar();
});
document.getElementById('nextYear').addEventListener('click', () => {
  currentYear++;
  renderCalendar();
});

/* ── INIT ── */
loadData();
initForm();
renderCalendar();
</script>
</body>
